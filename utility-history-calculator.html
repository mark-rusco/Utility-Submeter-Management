<style>
:root{--green:#16a34a;--green2:#0f8a3b;--soft:#edf9f1;--bg:#f6f8f6;--card:#fff;--text:#102018;--muted:#748178;--line:#e3e9e4;--red:#dc2626;--yellow:#ca8a04;--shadow:0 14px 36px rgba(16,32,24,.08);--radius:24px}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}button,input,select,textarea{font:inherit}button{border:0;cursor:pointer}.topbar{height:32px;background:var(--green);position:sticky;top:0;z-index:5}.app{max-width:880px;margin:auto;padding:24px 16px 112px}.header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:18px}.header h1{margin:0;font-size:38px;letter-spacing:-1.3px;line-height:1}.header p{margin:8px 0 0;color:var(--muted);font-weight:700}.head-actions{display:flex;gap:9px}.iconbtn,.pillbtn{height:52px;border-radius:18px;background:#fff;box-shadow:var(--shadow);color:var(--green);font-weight:900}.iconbtn{width:52px;font-size:22px}.pillbtn{padding:0 18px;font-size:16px}.page{display:none}.page.active{display:block}.hero{background:linear-gradient(135deg,#fff,#effaf2);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:30px;padding:22px;overflow:hidden;position:relative}.hero:after{content:"";position:absolute;right:-46px;top:-48px;width:150px;height:150px;border-radius:50%;background:#d8f7e3}.label{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#839087;font-weight:950}.value{font-size:36px;font-weight:950;letter-spacing:-1px;margin:6px 0 2px}.muted{color:var(--muted);font-weight:700}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin:14px 0}.card .value{font-size:25px}.section{display:flex;justify-content:space-between;align-items:end;margin:26px 4px 12px}.section h2{margin:0;font-size:24px;letter-spacing:-.4px}.chipbar{display:flex;gap:9px;overflow:auto;padding:2px 0 10px}.chipbar::-webkit-scrollbar{display:none}.chip{white-space:nowrap;border-radius:999px;background:#fff;border:1px solid var(--line);color:#435047;font-weight:900;padding:10px 15px}.chip.active{background:var(--soft);border-color:var(--green);color:var(--green)}.list{display:grid;gap:11px}.row{display:flex;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 8px 25px rgba(16,32,24,.06);padding:14px}.body{flex:1;min-width:0}.title{font-weight:950;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{color:var(--muted);font-weight:650;font-size:14px;line-height:1.35;margin-top:3px}.amount{text-align:right;font-weight:950;white-space:nowrap}.logo{width:50px;height:50px;border-radius:17px;display:grid;place-items:center;font-weight:950;font-size:11px;flex:0 0 50px;color:#fff}.mco{background:linear-gradient(135deg,#f97316,#facc15);color:#632609}.may{background:linear-gradient(135deg,#0ea5e9,#2563eb)}.unitlogo{background:linear-gradient(135deg,#dcfce7,#86efac);color:#14532d}.badge{display:inline-flex;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:950;margin-top:6px}.paid{background:#dcfce7;color:#15803d}.unpaid{background:#fee2e2;color:#b91c1c}.empty{border:1px dashed #cfd8d1;background:#fff;border-radius:22px;padding:28px 18px;text-align:center;color:var(--muted);font-weight:750}.bottom{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:min(850px,calc(100% - 26px));background:#fff;border:1px solid var(--line);border-radius:31px;box-shadow:0 18px 45px rgba(16,32,24,.20);padding:9px;z-index:10;display:grid;grid-template-columns:repeat(4,1fr) 66px;gap:4px}.nav{background:transparent;color:#829087;border-radius:22px;padding:9px 2px;font-size:11px;font-weight:950}.nav span{display:block;font-size:22px;line-height:1.1}.nav.active{background:var(--soft);color:var(--green)}.fab{height:62px;width:62px;border-radius:24px;background:var(--green);color:#fff;font-size:42px;line-height:1;box-shadow:0 14px 32px rgba(22,163,74,.35)}.shade{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:20;display:none}.shade.show{display:block}.sheet{position:fixed;left:50%;bottom:0;transform:translateX(-50%) translateY(105%);width:min(880px,100%);max-height:92dvh;overflow:auto;background:#fff;z-index:21;border-radius:30px 30px 0 0;padding:14px 16px max(20px,env(safe-area-inset-bottom));box-shadow:0 -20px 45px rgba(0,0,0,.22);transition:.2s}.sheet.show{transform:translateX(-50%) translateY(0)}.grab{width:48px;height:5px;border-radius:999px;background:#d6ded9;margin:0 auto 15px}.sheet h2{margin:0 0 13px;font-size:24px}.choice{width:100%;display:flex;gap:13px;align-items:center;text-align:left;background:#fff;border:1px solid var(--line);border-radius:21px;padding:15px;margin:10px 0}.choice i{width:50px;height:50px;border-radius:17px;display:grid;place-items:center;background:var(--soft);font-style:normal;color:var(--green);font-size:24px;flex:0 0 50px}.choice b{display:block}.choice small{display:block;color:var(--muted);font-weight:650;margin-top:2px}.field{margin:12px 0}.field label{display:block;font-weight:900;margin:0 0 7px;color:#334139}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);background:#fbfcfb;border-radius:16px;padding:14px;outline:0}.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green);background:#fff}.two{display:grid;grid-template-columns:1fr 1fr;gap:11px}.btn{width:100%;border-radius:18px;background:var(--green);color:#fff;padding:14px 16px;font-weight:950;margin-top:9px}.btn.secondary{background:#edf2ee;color:#24312a}.btn.danger{background:#fee2e2;color:#b91c1c}.btnrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}.miniBtn{border-radius:14px;background:#eef3ef;color:#25332b;padding:9px 11px;font-weight:900}.calc{background:#f7faf8;border:1px solid var(--line);border-radius:18px;padding:14px;margin:12px 0;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;white-space:pre-wrap;line-height:1.7;overflow:auto}.search{display:flex;gap:10px;align-items:center;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);border-radius:20px;padding:12px 14px;margin:12px 0}.search input{border:0;outline:0;background:transparent;flex:1}.toast{position:fixed;left:50%;bottom:104px;transform:translate(-50%,18px);background:#111827;color:#fff;border-radius:999px;padding:12px 18px;font-weight:900;opacity:0;transition:.2s;z-index:40}.toast.show{opacity:1;transform:translate(-50%,0)}.printOnly{display:none}.receiptPaper{width:80mm;max-width:320px;margin:0 auto;background:#fff;color:#000;padding:10px 12px;font-family:'Courier New',ui-monospace,monospace;border:1px solid #ddd}.receiptPaper pre{font-family:'Courier New',ui-monospace,monospace;font-size:12px;line-height:1.35;white-space:pre-wrap;margin:0}.receiptPaper .rxTotal{font-size:18px;font-weight:900;text-align:center;margin:8px 0}.receiptActions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}@media(max-width:560px){.app{padding:22px 13px 108px}.header h1{font-size:34px}.pillbtn{display:none}.grid,.two,.btnrow{grid-template-columns:1fr}.card{padding:16px}.row{align-items:flex-start}.amount{font-size:14px}.bottom{grid-template-columns:repeat(4,1fr) 61px}.fab{height:58px;width:58px}.nav{font-size:10px}.nav span{font-size:21px}}@media print{body{background:#fff}.topbar,.header,.bottom,.shade,.sheet,.noPrint{display:none!important}.app{padding:0}.page{display:none!important}.printOnly{display:block!important}.receipt{padding:0;color:#000;background:#fff}.receiptPaper{border:0;width:80mm;max-width:80mm;margin:0;padding:4mm;font-family:'Courier New',monospace}.receiptPaper pre{font:11px/1.35 'Courier New',monospace;white-space:pre-wrap}.receiptPaper .rxTotal{text-align:center;font-size:16px;font-weight:900;margin-top:6px}}

/* Responsive polish: prevent horizontal scrolling and make record cards stack cleanly */
html, body { width:100%; overflow-x:hidden; }
.app, .sheet, .bottom { max-width:100%; }
.row { width:100%; min-width:0; }
.body, .title, .meta { min-width:0; overflow-wrap:anywhere; word-break:break-word; }
.amount { flex:0 0 auto; max-width:34%; overflow:hidden; text-overflow:ellipsis; }
.row .chipbar { flex-wrap:wrap; overflow:visible; padding-bottom:0; margin-top:8px; }
.row .miniBtn { white-space:nowrap; }
img, video, canvas { max-width:100%; height:auto; }
input, select, textarea { min-width:0; }
@media (max-width:720px){
  .app{width:100%; padding-left:clamp(12px,4vw,18px); padding-right:clamp(12px,4vw,18px);}
  .header{align-items:center; gap:10px;}
  .header h1{font-size:clamp(30px,9vw,42px);}
  .header p{font-size:clamp(14px,4vw,18px);}
  .head-actions{flex-shrink:0;}
  .hero{border-radius:26px; padding:20px;}
  .value{font-size:clamp(28px,9vw,38px);}
  .section h2{font-size:clamp(20px,6vw,26px);}
  .row{display:grid; grid-template-columns:54px minmax(0,1fr); align-items:start; gap:12px; padding:14px; border-radius:24px;}
  .row .amount{grid-column:2; text-align:left; max-width:100%; width:100%; font-size:18px; margin-top:4px;}
  .row .body{width:100%;}
  .title{white-space:normal; font-size:17px; line-height:1.2;}
  .meta{font-size:14px;}
  .chipbar{gap:8px;}
  .chip{padding:10px 16px;}
  .miniBtn{padding:10px 13px; border-radius:15px; font-size:14px;}
  .search{border-radius:22px;}
  .bottom{bottom:10px; width:calc(100% - 22px); grid-template-columns:repeat(4,minmax(0,1fr)) 60px; border-radius:28px; padding:8px;}
  .nav{min-width:0; overflow:hidden; text-overflow:ellipsis;}
  .fab{width:58px; height:58px; border-radius:22px; font-size:38px;}
  .sheet{width:100%; border-radius:28px 28px 0 0; padding-left:16px; padding-right:16px;}
  .two,.grid,.btnrow{grid-template-columns:1fr!important;}
}
@media (max-width:390px){
  .app{padding-left:10px; padding-right:10px;}
  .row{grid-template-columns:46px minmax(0,1fr); gap:10px; padding:12px;}
  .logo{width:46px; height:46px; flex-basis:46px; border-radius:16px; font-size:10px;}
  .miniBtn{font-size:13px; padding:9px 11px;}
  .nav{font-size:9px;}
  .nav span{font-size:19px;}
  .bottom{grid-template-columns:repeat(4,minmax(0,1fr)) 56px; width:calc(100% - 16px);}
  .fab{width:54px;height:54px;}
}
@media (min-width:721px){
  .row .chipbar{max-width:100%;}
}

</style>
</head>
<body>
<div class="topbar noPrint"></div>
<main class="app">
<header class="header noPrint"><div><h1 id="pageTitle">Utilities</h1><p id="pageSub">Clean billing, submeter, and collection tracker</p></div><div class="head-actions"><button class="iconbtn" onclick="nav('settings')">⚙</button><button class="pillbtn" onclick="openAdd()">＋ Add</button></div></header>
<section id="dashboard" class="page active"></section><section id="history" class="page"></section><section id="units" class="page"></section><section id="reports" class="page"></section><section id="settings" class="page"></section><section id="print" class="printOnly receipt"></section>
</main>
<nav class="bottom noPrint"><button class="nav active" data-page="dashboard" onclick="nav('dashboard')"><span>⌂</span>Home</button><button class="nav" data-page="history" onclick="nav('history')"><span>◴</span>History</button><button class="nav" data-page="units" onclick="nav('units')"><span>□</span>Units</button><button class="nav" data-page="reports" onclick="nav('reports')"><span>↗</span>Reports</button><button class="fab" onclick="openAdd()">+</button></nav>
<div id="shade" class="shade" onclick="closeSheet()"></div><section id="sheet" class="sheet"><div class="grab"></div><div id="sheetContent"></div></section><div id="toast" class="toast"></div><input id="importer" type="file" accept="application/json" hidden>
<script>
const KEY='utilityhub_clean_v1';let db=load(),current='dashboard',filter='all',searchText='';
function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4)}
function seed(){return{settings:{electricRate:16,currency:'₱',footer:'Thank you.'},occupants:[{id:uid(),name:'Sanla Tira',code:'Unit 01'},{id:uid(),name:'Kuya',code:'Unit 02'}],bills:[],readings:[]}}
function load(){try{return JSON.parse(localStorage.getItem(KEY))||seed()}catch(e){return seed()}}
function save(){localStorage.setItem(KEY,JSON.stringify(db));render()}
function n(v){return Number(String(v??'').replace(/,/g,''))||0}function money(v){return (db.settings.currency||'₱')+n(v).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2})}function monthNow(){return new Date().toISOString().slice(0,7)}
function byId(a,id){return a.find(x=>x.id==id)}function occ(id){return byId(db.occupants,id)||{name:'Deleted occupant',code:'Unit'} }function bill(id){return byId(db.bills,id)}
function logo(u){return u==='water'?'<div class="logo may">MAY</div>':'<div class="logo mco">MCO</div>'}function utilName(u){return u==='water'?'Water':'Electricity'}
function rateForBill(b){if(!b)return 0;return b.utility==='water'? n(b.charges)/Math.max(n(b.consumption),1):n(db.settings.electricRate)}
function rCons(r){return Math.max(0,n(r.current)-n(r.previous))}function rCharge(r){return rCons(r)*n(r.rate)}function billReads(id){return db.readings.filter(r=>r.billId===id)}function occupantCharge(id){return db.readings.filter(r=>r.occupantId===id).reduce((a,r)=>a+rCharge(r),0)}function occupantPaid(id){return db.readings.filter(r=>r.occupantId===id&&r.status==='paid').reduce((a,r)=>a+n(r.paymentAmount||rCharge(r)),0)}
function billSubTotal(b){return billReads(b.id).reduce((a,r)=>a+rCharge(r),0)}function myBill(b){return n(b.charges)-billSubTotal(b)}function paidTotal(){return db.readings.filter(r=>r.status==='paid').reduce((a,r)=>a+n(r.paymentAmount||rCharge(r)),0)}function unpaidTotal(){return db.readings.filter(r=>r.status!=='paid').reduce((a,r)=>a+rCharge(r),0)}
function toast(t){let e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1700)}
function nav(p){current=p;document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(p).classList.add('active');document.querySelectorAll('.nav').forEach(x=>x.classList.toggle('active',x.dataset.page===p));render()}
function titles(){let t={dashboard:['Utilities','Overview of bills and collections'],history:['History','Search, filter, edit, and print records'],units:['Occupants','Configured units and total charges'],reports:['Reports','Monthly summary and printable receipts'],settings:['Settings','Rates, occupants, backup, and reset']};document.getElementById('pageTitle').textContent=t[current][0];document.getElementById('pageSub').textContent=t[current][1]}
function render(){titles();renderDashboard();renderHistory();renderUnits();renderReports();renderSettings()}
function latestBill(u){return db.bills.filter(b=>b.utility===u).sort((a,b)=>String(b.month).localeCompare(String(a.month)))[0]}
function renderDashboard(){let e=document.getElementById('dashboard'),le=latestBill('electric'),lw=latestBill('water'),mb=db.bills.reduce((a,b)=>a+myBill(b),0);e.innerHTML=`<div class="hero"><div class="label">Outstanding Balance</div><div class="value">${money(unpaidTotal())}</div><div class="muted">${db.readings.filter(r=>r.status!=='paid').length} unpaid submeter record(s)</div></div><div class="grid"><div class="card"><div class="label">Collected</div><div class="value">${money(paidTotal())}</div><div class="muted">Paid records only</div></div><div class="card"><div class="label">My Bill</div><div class="value">${money(mb)}</div><div class="muted">Main bills less occupant charges</div></div></div><div class="section"><h2>Latest Bills</h2><span class="muted">Main utility</span></div><div class="list">${billRow(le)||''}${billRow(lw)||''}${!le&&!lw?'<div class="empty">No monthly bills yet. Tap + to add your first bill.</div>':''}</div><div class="section"><h2>Occupant Totals</h2><button class="miniBtn" onclick="nav('units')">View all</button></div><div class="list">${db.occupants.slice(0,4).map(o=>unitRow(o)).join('')||'<div class="empty">No occupants configured.</div>'}</div>`}
function billRow(b){if(!b)return'';return`<div class="row">${logo(b.utility)}<div class="body"><div class="title">${utilName(b.utility)} • ${b.month}</div><div class="meta">Consumption: ${n(b.consumption)} ${b.utility==='water'?'cu.m':'kWh'} • Rate: ${money(rateForBill(b))}/${b.utility==='water'?'cu.m':'kWh'}</div></div><div class="amount">${money(b.charges)}<br><span class="meta">My bill ${money(myBill(b))}</span></div></div>`}
function unitRow(o){let total=occupantCharge(o.id),paid=occupantPaid(o.id),unpaid=total-paid;return`<div class="row"><div class="logo unitlogo">${(o.code||'U').slice(0,3).toUpperCase()}</div><div class="body"><div class="title">${o.name}</div><div class="meta">${o.code||'Unit'} • Paid ${money(paid)}</div><span class="badge ${unpaid>0?'unpaid':'paid'}">${unpaid>0?'Unpaid':'Paid'}</span></div><div class="amount">${money(total)}<br><span class="meta">Bal. ${money(unpaid)}</span></div></div>`}
function allRecords(){let bills=db.bills.map(b=>({...b,type:'bill',sort:b.month}));let reads=db.readings.map(r=>({...r,type:'reading',sort:r.month}));return bills.concat(reads).sort((a,b)=>String(b.sort).localeCompare(String(a.sort)))}
function renderHistory(){let e=document.getElementById('history');let recs=allRecords().filter(x=>filter==='all'||x.type===filter||x.status===filter||x.utility===filter).filter(x=>JSON.stringify(x).toLowerCase().includes(searchText.toLowerCase()));e.innerHTML=`<div class="search">🔎<input placeholder="Search month, utility, occupant, status..." value="${searchText}" oninput="searchText=this.value;renderHistory()"></div><div class="chipbar">${['all','bill','reading','electric','water','paid','unpaid'].map(f=>`<button class="chip ${filter===f?'active':''}" onclick="filter='${f}';renderHistory()">${f[0].toUpperCase()+f.slice(1)}</button>`).join('')}</div><div class="list">${recs.map(recordRow).join('')||'<div class="empty">No history found. Tap + to add monthly bills or submeter readings.</div>'}</div>`}
function recordRow(x){if(x.type==='bill')return`<div class="row">${logo(x.utility)}<div class="body"><div class="title">Monthly Bill • ${utilName(x.utility)}</div><div class="meta">${x.month} • ${n(x.consumption)} ${x.utility==='water'?'cu.m':'kWh'} • ${money(x.charges)}</div><div class="chipbar"><button class="miniBtn" onclick="formBill('${x.id}')">Edit</button><button class="miniBtn" onclick="deleteBill('${x.id}')">Delete</button></div></div><div class="amount">Rate<br>${money(rateForBill(x))}</div></div>`;let o=occ(x.occupantId),b=bill(x.billId);return`<div class="row"><div class="logo unitlogo">${(o.code||'U').slice(0,3).toUpperCase()}</div><div class="body"><div class="title">Submeter • ${utilName(x.utility)}</div><div class="meta">${x.month} • ${o.name} • ${x.previous} → ${x.current} = ${rCons(x)}</div><span class="badge ${x.status==='paid'?'paid':'unpaid'}">${x.status==='paid'?'Paid':'Unpaid'}</span><div class="chipbar"><button class="miniBtn" onclick="formReading('${x.id}')">Edit</button><button class="miniBtn" onclick="formPayment('${x.id}')">Payment</button><button class="miniBtn" onclick="printReceipt('${x.id}')">Print</button><button class="miniBtn" onclick="deleteReading('${x.id}')">Delete</button></div></div><div class="amount">${money(rCharge(x))}<br><span class="meta">${b?b.month:'Unlinked'}</span></div></div>`}
function renderUnits(){let e=document.getElementById('units');e.innerHTML=`<div class="section"><h2>Occupants</h2><button class="miniBtn" onclick="formOccupant()">+ Occupant</button></div><div class="list">${db.occupants.map(o=>`<div class="card"><div class="row" style="box-shadow:none;border:0;padding:0"><div class="logo unitlogo">${(o.code||'U').slice(0,3).toUpperCase()}</div><div class="body"><div class="title">${o.name}</div><div class="meta">${o.code||'Unit code not set'}</div></div><div class="amount">${money(occupantCharge(o.id))}<br><span class="meta">Total charges</span></div></div><div class="grid"><div><div class="label">Paid</div><div class="value">${money(occupantPaid(o.id))}</div></div><div><div class="label">Unpaid</div><div class="value">${money(occupantCharge(o.id)-occupantPaid(o.id))}</div></div></div><div class="btnrow"><button class="btn secondary" onclick="formOccupant('${o.id}')">Edit</button><button class="btn danger" onclick="deleteOccupant('${o.id}')">Delete</button></div></div>`).join('')||'<div class="empty">No occupants configured.</div>'}</div>`}
function renderReports(){let months=[...new Set(db.bills.map(b=>b.month))].sort().reverse();let rows=months.map(m=>{let bs=db.bills.filter(b=>b.month===m),main=bs.reduce((a,b)=>a+n(b.charges),0),subs=bs.reduce((a,b)=>a+billSubTotal(b),0);return`<div class="row"><div class="logo unitlogo">${m.slice(5)}</div><div class="body"><div class="title">${m}</div><div class="meta">Main ${money(main)} • Occupants ${money(subs)}</div></div><div class="amount">My Bill<br>${money(main-subs)}</div></div>`}).join('');e=document.getElementById('reports');e.innerHTML=`<div class="grid"><div class="card"><div class="label">Total Main Bills</div><div class="value">${money(db.bills.reduce((a,b)=>a+n(b.charges),0))}</div></div><div class="card"><div class="label">Total Occupants</div><div class="value">${money(db.readings.reduce((a,r)=>a+rCharge(r),0))}</div></div></div><div class="section"><h2>Monthly Summary</h2></div><div class="list">${rows||'<div class="empty">No reports yet.</div>'}</div>`}
function renderSettings(){let e=document.getElementById('settings');e.innerHTML=`<div class="card"><div class="label">Electricity Rate</div><div class="field"><label>Default price per kWh</label><input id="setRate" type="number" step="0.01" value="${db.settings.electricRate}"></div><div class="field"><label>Currency</label><input id="setCur" value="${db.settings.currency}"></div><button class="btn" onclick="db.settings.electricRate=n(setRate.value);db.settings.currency=setCur.value||'₱';save();toast('Settings saved')">Save Settings</button></div><div class="card"><div class="label">Backup</div><div class="btnrow"><button class="btn secondary" onclick="exportData()">Export Data</button><button class="btn secondary" onclick="importer.click()">Import Data</button></div><button class="btn danger" onclick="resetData()">Reset All Data</button></div><div class="card"><div class="label">Occupants</div><div class="list">${db.occupants.map(o=>`<div class="row"><div class="body"><div class="title">${o.name}</div><div class="meta">${o.code}</div></div><button class="miniBtn" onclick="formOccupant('${o.id}')">Edit</button></div>`).join('')}</div><button class="btn" onclick="formOccupant()">Add Occupant</button></div>`}
function openSheet(html){document.getElementById('sheetContent').innerHTML=html;document.getElementById('shade').classList.add('show');document.getElementById('sheet').classList.add('show')}function closeSheet(){document.getElementById('shade').classList.remove('show');document.getElementById('sheet').classList.remove('show')}
function openAdd(){openSheet(`<h2>Add Record</h2><button class="choice" onclick="formBill()"><i>📄</i><span><b>Monthly Bill</b><small>Add Meralco or Maynilad bill only</small></span></button><button class="choice" onclick="formReading()"><i>⚡</i><span><b>Submeter Reading</b><small>Add one occupant reading only</small></span></button><button class="choice" onclick="pickPayment()"><i>💰</i><span><b>Payment Update</b><small>Update paid or unpaid status</small></span></button><button class="choice" onclick="formOccupant()"><i>👤</i><span><b>Occupant</b><small>Add or edit occupants</small></span></button><button class="btn secondary" onclick="closeSheet()">Cancel</button>`)}
function formBill(id){let b=id?bill(id):{id:'',utility:'electric',month:monthNow(),consumption:'',charges:'',notes:''};openSheet(`<h2>${id?'Edit':'Add'} Monthly Bill</h2><div class="field"><label>Utility</label><select id="bUtility" onchange="billRatePreview()"><option value="electric" ${b.utility==='electric'?'selected':''}>Meralco / Electricity</option><option value="water" ${b.utility==='water'?'selected':''}>Maynilad / Water</option></select></div><div class="two"><div class="field"><label>Month</label><input id="bMonth" type="month" value="${b.month}"></div><div class="field"><label>Total Consumption</label><input id="bCons" type="number" step="0.01" value="${b.consumption}" oninput="billRatePreview()"></div></div><div class="field"><label>Current Charges</label><input id="bCharges" type="number" step="0.01" value="${b.charges}" oninput="billRatePreview()"></div><div id="ratePreview" class="calc"></div><div class="field"><label>Notes</label><textarea id="bNotes">${b.notes||''}</textarea></div><button class="btn" onclick="saveBill('${id||''}')">Save Monthly Bill</button><button class="btn secondary" onclick="openAdd()">Back</button>`);billRatePreview()}
function billRatePreview(){let u=document.getElementById('bUtility')?.value,c=n(document.getElementById('bCons')?.value),ch=n(document.getElementById('bCharges')?.value);let rate=u==='water'?ch/Math.max(c,1):n(db.settings.electricRate);document.getElementById('ratePreview').textContent=u==='water'?`Water rate changes monthly:\n${money(ch)} ÷ ${c||0} cu.m = ${money(rate)}/cu.m`:`Electricity uses configured rate:\n${money(rate)}/kWh`}
function saveBill(edit){let data={id:edit||uid(),utility:bUtility.value,month:bMonth.value||monthNow(),consumption:n(bCons.value),charges:n(bCharges.value),notes:bNotes.value,createdAt:new Date().toISOString()};let i=db.bills.findIndex(x=>x.id===edit);if(i>=0)db.bills[i]={...db.bills[i],...data};else db.bills.push(data);save();closeSheet();toast('Monthly bill saved')}
function billOptions(util,sel){let bs=db.bills.filter(b=>b.utility===util).sort((a,b)=>String(b.month).localeCompare(String(a.month)));return bs.map(b=>`<option value="${b.id}" ${b.id===sel?'selected':''}>${b.month} • ${utilName(b.utility)} • ${money(rateForBill(b))}/${util==='water'?'cu.m':'kWh'}</option>`).join('')}
function lastReading(occId,util,exclude){let arr=db.readings.filter(r=>r.occupantId===occId&&r.utility===util&&r.id!==exclude).sort((a,b)=>String(b.month+b.createdAt).localeCompare(String(a.month+a.createdAt)));return arr[0]?.current||0}
function formReading(id){let r=id?byId(db.readings,id):{id:'',utility:'electric',month:monthNow(),occupantId:db.occupants[0]?.id||'',billId:'',previous:0,current:'',status:'unpaid',photo:''};if(!r.billId){let b=latestBill(r.utility);r.billId=b?b.id:''}let occOpts=db.occupants.map(o=>`<option value="${o.id}" ${o.id===r.occupantId?'selected':''}>${o.name} (${o.code})</option>`).join('');openSheet(`<h2>${id?'Edit':'Add'} Submeter Reading</h2><div class="field"><label>Utility</label><select id="rUtility" onchange="refreshReadingForm('${id||''}')"><option value="electric" ${r.utility==='electric'?'selected':''}>Electricity</option><option value="water" ${r.utility==='water'?'selected':''}>Water</option></select></div><div class="field"><label>Occupant</label><select id="rOcc" onchange="autoPrev('${id||''}')">${occOpts}</select></div><div class="field"><label>Linked Main Bill</label><select id="rBill" onchange="readingPreview()">${billOptions(r.utility,r.billId)}</select></div><div class="two"><div class="field"><label>Previous Reading</label><input id="rPrev" type="number" step="0.01" value="${r.previous||lastReading(r.occupantId,r.utility,id)}" oninput="readingPreview()"></div><div class="field"><label>Current Reading</label><input id="rCurr" type="number" step="0.01" value="${r.current}" oninput="readingPreview()"></div></div><div class="field"><label>Meter Photo</label><input id="rPhoto" type="file" accept="image/*" capture="environment"></div><div id="readPreview" class="calc"></div><button class="btn" onclick="saveReading('${id||''}')">Save Reading</button><button class="btn secondary" onclick="openAdd()">Back</button>`);readingPreview()}
function refreshReadingForm(id){let u=rUtility.value, b=latestBill(u);rBill.innerHTML=billOptions(u,b?.id);autoPrev(id)}function autoPrev(id){rPrev.value=lastReading(rOcc.value,rUtility.value,id);readingPreview()}function readingPreview(){let b=bill(rBill?.value),rate=rateForBill(b)||n(db.settings.electricRate),prev=n(rPrev?.value),cur=n(rCurr?.value),cons=Math.max(0,cur-prev);document.getElementById('readPreview').textContent=`Consumption\n= Current Reading - Previous Reading\n= ${cur} - ${prev}\n= ${cons}\n\nCharge\n= Consumption × Rate\n= ${cons} × ${money(rate)}\n= ${money(cons*rate)}`}
function saveReading(edit){let b=bill(rBill.value);if(!b){toast('Please add/link a main bill first');return}let rate=rateForBill(b);let data={id:edit||uid(),utility:rUtility.value,month:b.month,occupantId:rOcc.value,billId:b.id,previous:n(rPrev.value),current:n(rCurr.value),rate:rate,status:'unpaid',paymentAmount:0,paymentDate:'',createdAt:new Date().toISOString()};let i=db.readings.findIndex(x=>x.id===edit);if(i>=0)db.readings[i]={...db.readings[i],...data,status:db.readings[i].status||'unpaid',paymentAmount:db.readings[i].paymentAmount||0,paymentDate:db.readings[i].paymentDate||''};else db.readings.push(data);save();closeSheet();toast('Submeter reading saved')}
function pickPayment(){let rows=db.readings.filter(r=>r.status!=='paid').map(r=>{let o=occ(r.occupantId);return`<button class="choice" onclick="formPayment('${r.id}')"><i>💰</i><span><b>${o.name}</b><small>${r.month} • ${utilName(r.utility)} • ${money(rCharge(r))}</small></span></button>`}).join('');openSheet(`<h2>Payment Update</h2>${rows||'<div class="empty">No unpaid records.</div>'}<button class="btn secondary" onclick="openAdd()">Back</button>`)}
function formPayment(id){let r=byId(db.readings,id),o=occ(r.occupantId);openSheet(`<h2>Payment Update</h2><div class="card"><div class="title">${o.name}</div><div class="meta">${r.month} • ${utilName(r.utility)} • ${money(rCharge(r))}</div></div><div class="field"><label>Status</label><select id="pStatus"><option value="unpaid" ${r.status!=='paid'?'selected':''}>Unpaid</option><option value="paid" ${r.status==='paid'?'selected':''}>Paid</option></select></div><div class="two"><div class="field"><label>Payment Date</label><input id="pDate" type="date" value="${r.paymentDate||new Date().toISOString().slice(0,10)}"></div><div class="field"><label>Payment Amount</label><input id="pAmount" type="number" step="0.01" value="${r.paymentAmount||rCharge(r)}"></div></div><button class="btn" onclick="savePayment('${id}')">Save Payment</button><button class="btn secondary" onclick="pickPayment()">Back</button>`)}function savePayment(id){let r=byId(db.readings,id);r.status=pStatus.value;r.paymentDate=pStatus.value==='paid'?pDate.value:'';r.paymentAmount=pStatus.value==='paid'?n(pAmount.value):0;save();closeSheet();toast('Payment updated')}
function formOccupant(id){let o=id?occ(id):{name:'',code:''};openSheet(`<h2>${id?'Edit':'Add'} Occupant</h2><div class="field"><label>Occupant Name</label><input id="oName" value="${o.name||''}"></div><div class="field"><label>Unit Code shown on receipts</label><input id="oCode" value="${o.code||''}" placeholder="Unit 01"></div><button class="btn" onclick="saveOccupant('${id||''}')">Save Occupant</button><button class="btn secondary" onclick="openAdd()">Back</button>`)}function saveOccupant(id){let data={id:id||uid(),name:oName.value||'Occupant',code:oCode.value||'Unit'};let i=db.occupants.findIndex(x=>x.id===id);if(i>=0)db.occupants[i]=data;else db.occupants.push(data);save();closeSheet();toast('Occupant saved')}
function deleteBill(id){if(confirm('Delete this bill and linked readings?')){db.bills=db.bills.filter(x=>x.id!==id);db.readings=db.readings.filter(x=>x.billId!==id);save();toast('Deleted')}}function deleteReading(id){if(confirm('Delete this reading?')){db.readings=db.readings.filter(x=>x.id!==id);save();toast('Deleted')}}function deleteOccupant(id){if(confirm('Delete occupant? Readings will remain but occupant name will show as deleted.')){db.occupants=db.occupants.filter(x=>x.id!==id);save();toast('Occupant deleted')}}
function esc(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function line(ch='-',len=32){return ch.repeat(len)}
function center(txt,len=32){txt=String(txt||'');let left=Math.max(0,Math.floor((len-txt.length)/2));return ' '.repeat(left)+txt}
function receiptText(id){let r=byId(db.readings,id),b=bill(r.billId),o=occ(r.occupantId),unit=(o.code||'UNIT').toUpperCase();let uom=r.utility==='water'?'Cu.m':'kWh',rateLabel=r.utility==='water'?'/Cu.m':'/kWh',rate=n(r.rate)||rateForBill(b),cons=rCons(r),charge=rCharge(r),status=r.status==='paid'?'PAID':'UNPAID';let mainCons=n(b?.consumption),mainCharges=n(b?.charges);let text=[];
text.push(line('='));
text.push(center('UTILITY SUBMETER BILL'));
text.push(line('='));
text.push('RECEIPT ID : '+String(r.id).slice(0,10).toUpperCase());
text.push('UNIT CODE  : '+unit);
text.push('UTILITY    : '+utilName(r.utility).toUpperCase());
text.push('BILL MONTH : '+(r.month||''));
text.push('DATE PRINT : '+new Date().toLocaleString());
text.push(line('-'));
text.push(center('MAIN BILL INFORMATION'));
text.push(line('-'));
if(b){
 text.push('MAIN CONSUMPTION');
 text.push(mainCons.toLocaleString()+' '+uom);
 text.push('');
 text.push('CURRENT CHARGES');
 text.push(money(mainCharges));
 text.push('');
 text.push(center('RATE COMPUTATION'));
 if(r.utility==='water'){
   text.push(money(mainCharges)+' ÷ '+mainCons.toLocaleString()+' '+uom);
   text.push('= '+money(rate)+' '+rateLabel);
 }else{
   text.push('CONFIGURED ELECTRICITY RATE');
   text.push('= '+money(rate)+' '+rateLabel);
 }
}else{
 text.push('No linked main bill.');
}
text.push(line('-'));
text.push(center('SUBMETER INFORMATION'));
text.push(line('-'));
text.push('PREVIOUS READING');
text.push(n(r.previous).toLocaleString());
text.push('');
text.push('CURRENT READING');
text.push(n(r.current).toLocaleString());
text.push('');
text.push('CONSUMPTION');
text.push(n(r.current).toLocaleString()+' - '+n(r.previous).toLocaleString());
text.push('= '+cons.toLocaleString()+' '+uom);
text.push(line('-'));
text.push(center('BILL COMPUTATION'));
text.push(line('-'));
text.push(cons.toLocaleString()+' × '+money(rate));
text.push('= '+money(charge));
text.push(line('-'));
text.push(center('PAYMENT STATUS'));
text.push(line('-'));
text.push('STATUS : '+status);
if(status==='PAID'){
 text.push('DATE   : '+(r.paymentDate||''));
 text.push('PAID   : '+money(r.paymentAmount||charge));
}else{
 text.push('AMOUNT DUE');
 text.push(money(charge));
}
text.push(line('='));
text.push(center(status==='PAID'?'PAID':'AMOUNT DUE'));
text.push(center(money(status==='PAID'?(r.paymentAmount||charge):charge)));
text.push(line('='));
text.push(center(db.settings.footer||'THANK YOU'));
return text.join('\n')}
function printReceipt(id){let txt=receiptText(id);document.getElementById('print').innerHTML=`<div class="receiptPaper"><pre>${esc(txt)}</pre></div>`;openSheet(`<h2>Receipt Preview</h2><div class="receiptPaper"><pre>${esc(txt)}</pre></div><div class="receiptActions"><button class="btn" onclick="window.print()">Print</button><button class="btn secondary" onclick="closeSheet()">Close</button></div>`)}
function exportData(){let blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='utilityhub-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href)}
importer.onchange=e=>{let f=e.target.files[0];if(!f)return;let rd=new FileReader();rd.onload=()=>{try{let imported=JSON.parse(rd.result);if(!imported.settings||!imported.occupants)throw Error();db=imported;save();toast('Data imported')}catch{alert('Invalid backup file')}};rd.readAsText(f)}
function resetData(){if(confirm('Reset all app data?')){db=seed();save();toast('Data reset')}}
function pwa(){let manifest={name:'UtilityHub',short_name:'UtilityHub',start_url:'.',display:'standalone',background_color:'#f6f8f6',theme_color:'#16a34a',icons:[{src:'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 512 512%22><rect width=%22512%22 height=%22512%22 rx=%22120%22 fill=%22%2316a34a%22/><text x=%22256%22 y=%22325%22 font-size=%22220%22 text-anchor=%22middle%22 fill=%22white%22>₱</text></svg>',sizes:'512x512',type:'image/svg+xml'}]};document.getElementById('manifest').href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'}));if('serviceWorker'in navigator){let sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))))`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{})}}
pwa();render();
</script>
</body>
</html>
